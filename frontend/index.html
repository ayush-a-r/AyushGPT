<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AyushGPT</title>
    <link rel="stylesheet" href="style.css">
    <!-- Font Awesome for icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <!-- Login / Register Screen -->
    <div id="login-screen" class="login-container">
        <div class="login-card">
            <i class="fa-solid fa-robot login-icon"></i>
            <h2>Welcome to AyushGPT</h2>
            <p>Sign in to access my AI Twin</p>
            
            <div class="input-group">
                <input type="email" id="email-input" placeholder="Email address" autocomplete="off">
                <input type="password" id="password-input" placeholder="Password">
            </div>
            
            <button id="login-btn" class="auth-btn primary-btn">Login</button>
            <button id="register-btn" class="auth-btn secondary-btn">Create Account</button>
        </div>
    </div>

    <!-- Main Chat Interface (Hidden until logged in) -->
    <div id="chat-app" class="chat-container hidden">
        <header class="chat-header">
            <div class="header-left">
                <div class="profile-pic">
                    <i class="fa-solid fa-robot"></i>
                </div>
                <div class="header-info">
                    <h2>AyushGPT</h2>
                    <p>Online • Memory Active</p>
                </div>
            </div>
            <button id="logout-btn" class="logout-btn" title="Logout">
                <i class="fa-solid fa-right-from-bracket"></i>
            </button>
        </header>

        <main class="chat-box" id="chat-box">
            <!-- Typing indicator injected via JS -->
        </main>

        <div class="chat-input-container">
            <input type="text" id="user-input" placeholder="Message AyushGPT..." autocomplete="off">
            <button id="send-btn"><i class="fa-solid fa-paper-plane"></i></button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
